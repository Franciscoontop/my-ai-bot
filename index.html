<!DOCTYPE html>
<html>
<head>
    <style>
        /* THE OVERRIDE: Ensure the container can't be hidden by the site */
        #force-wrapper {
            position: fixed !important;
            z-index: 2147483647 !important;
            bottom: 0;
            right: 0;
            pointer-events: none;
        }

        /* THE BUBBLE */
        #chat-bubble {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 65px;
            height: 65px;
            background: #ffffff;
            border-radius: 50%;
            cursor: pointer !important;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }

        /* MINIMAL GLOW - Clean and subtle */
        #chat-bubble::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 15px 2px rgba(0, 255, 255, 0.2);
            pointer-events: none;
        }

        /* THE WINDOW - Hidden by default */
        #chat-window {
            position: absolute;
            bottom: 100px;
            right: 25px;
            width: 350px;
            height: 500px;
            background: #111;
            border: 1px solid #333;
            border-radius: 15px;
            display: none; /* Changed via JS */
            flex-direction: column;
            pointer-events: auto;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
        }

        /* UI Elements */
        #chat-header { padding: 15px; background: #222; display: flex; justify-content: space-between; border-bottom: 1px solid #333; }
        #chat-content { flex: 1; padding: 15px; overflow-y: auto; background: #000; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 12px; font-size: 14px; max-width: 80%; }
        .ai { background: #333; align-self: flex-start; }
        .user { background: #fff; color: #000; align-self: flex-end; }
        .input-box { padding: 15px; display: flex; gap: 5px; background: #111; }
        input { flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; }
    </style>
</head>
<body>

<div id="force-wrapper">
    <div id="chat-bubble">
        <svg width="30" height="30" viewBox="0 0 24 24"><path d="M19,9L17.75,11.75L15,13L17.75,14.25L19,17L20.25,14.25L23,13L20.25,11.75L19,9M9,5L7,11L1,13L7,15L9,21L11,15L17,13L11,11L9,5M19,1L18.25,2.75L16.5,3.5L18.25,4.25L19,6L19.75,4.25L21.5,3.5L19.75,2.75L19,1Z" /></svg>
    </div>

    <div id="chat-window">
        <div id="chat-header">
            <span>Booking AI</span>
            <span id="close-btn" style="cursor:pointer">✕</span>
        </div>
        <div id="chat-content">
            <div class="msg ai">Hi! What is your name and what service do you need?</div>
        </div>
        <div class="input-box">
            <input id="user-input" placeholder="Type here...">
            <button id="send-btn" style="cursor:pointer">Send</button>
        </div>
    </div>
</div>

<script>
    const bubble = document.getElementById('chat-bubble');
    const windowEl = document.getElementById('chat-window');
    const closeBtn = document.getElementById('close-btn');
    const sendBtn = document.getElementById('send-btn');
    const input = document.getElementById('user-input');
    const content = document.getElementById('chat-content');

    let history = [];

    // THE FORCE TOGGLE
    bubble.addEventListener('click', function(e) {
        console.log("Bubble Clicked!"); // Check your browser console!
        windowEl.style.display = 'flex';
    });

    closeBtn.addEventListener('click', function() {
        windowEl.style.display = 'none';
    });

    async function sendMessage() {
        const text = input.value.trim();
        if(!text) return;

        content.innerHTML += `<div class="msg user">${text}</div>`;
        history.push({role: "user", content: text});
        input.value = "";
        
        const aiMsg = document.createElement('div');
        aiMsg.className = "msg ai";
        aiMsg.innerText = "...";
        content.appendChild(aiMsg);
        content.scrollTop = content.scrollHeight;

        try {
            const res = await fetch("/api/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({messages: history})
            });

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            aiMsg.innerText = "";

            while (true) {
                const {done, value} = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value);
                const lines = chunk.split("\n");
                for (const line of lines) {
                    if (line.startsWith("data: ")) {
                        const data = line.replace("data: ", "").trim();
                        if (data === "[DONE]") break;
                        try {
                            const parsed = JSON.parse(data);
                            const val = parsed.choices[0].delta.content || "";
                            aiMsg.innerText += val;
                        } catch(e) {}
                    }
                }
            }
            history.push({role: "assistant", content: aiMsg.innerText});
        } catch(e) {
            aiMsg.innerText = "Error connecting.";
        }
    }

    sendBtn.onclick = sendMessage;
    input.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
</script>

</body>
</html>
