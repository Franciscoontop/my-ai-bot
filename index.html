<!DOCTYPE html>
<html>
<head>
    <title>AI Business Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 600px; margin: auto; }
        #response { white-space: pre-wrap; background: #f4f4f4; padding: 15px; border-radius: 8px; min-height: 50px; border: 1px solid #ddd; }
        input { padding: 10px; width: 70%; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; cursor: pointer; background: #000; color: #fff; border: none; border-radius: 5px; }
        .review-box { text-align: center; margin-top: 40px; padding: 20px; border-top: 1px solid #eee; }
        
        /* POPUP CORE STYLES */
        #ai-popup { 
            position: fixed; 
            bottom: 80px; 
            right: 20px; 
            width: 280px; 
            background: white; 
            border: 2px solid #000; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3); 
            z-index: 10000;
            
            /* Hidden State */
            opacity: 0;
            visibility: hidden;
            transform: translateY(30px);
            transition: all 0.5s ease-in-out;
        }

        /* Visible State */
        #ai-popup.show {
            visibility: visible !important;
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        .close-btn {
            position: absolute;
            top: 5px;
            right: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 24px;
            color: #888;
        }
        .close-btn:hover { color: #000; }
    </style>
</head>
<body>

<h1>AI Business Assistant</h1>

<div style="margin-bottom: 20px;">
    <input id="msg" placeholder="Ask about our services..." />
    <button onclick="send()">Send</button>
</div>

<div id="response">Your AI assistant is ready!</div>

<div id="ai-popup">
    <span class="close-btn" onclick="closePopup()">×</span>
    <p><strong>Wait!</strong> 🤖 Before you go, did you know we have a 20% discount for new clients this week?</p>
    <button onclick="closePopup()" style="width:100%;">Ask AI about it</button>
</div>

<div class="review-box">
   <p>Happy with our service?</p>
