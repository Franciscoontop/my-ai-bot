<!DOCTYPE html>
<html>
<head>
    <title>AI Business Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; min-height: 100vh; }
        #ai-widget-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
        
        /* Modal Styles */
        #exit-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -45%) scale(0.95); width: 90%; max-width: 400px; background: #111; border: 1px solid #333; border-radius: 24px; padding: 40px; text-align: center; box-shadow: 0px 30px 60px rgba(0,0,0,0.9); pointer-events: none; z-index: 10000; opacity: 0; visibility: hidden; transition: all 0.5s ease; }
        #exit-modal.active { opacity: 1; visibility: visible; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
        .promo-code { background: #1a1a1a; border: 1px dashed #444; padding: 12px; font-size: 22px; font-weight: bold; border-radius: 12px; margin: 20px 0; }

        /* Bubble & Spiral Transition */
        #chat-bubble { position: absolute; bottom: 25px; right: 25px; width: 60px; height: 60px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; pointer-events: auto; z-index: 10001; transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        #chat-bubble.active-spiral { bottom: 597px; right: 343px; width: 26px; height: 26px; transform: rotate(720deg); }
        
        #chat-window { position: absolute; bottom: 95px; right: 25px; width: 360px; height: 550px; background: #111; border: 1px solid #333; border-radius: 20px; display: none; flex-direction: column; pointer-events: auto; overflow: hidden; opacity: 0; transition: opacity 0.5s ease; }
        #chat-window.open { display: flex; opacity: 1; }
        #response-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #050505; }
        .msg-bubble { padding: 10px 14px; border-radius: 15px; font-size: 14px; line-height: 1.4; max-width: 85%; }
        .ai-msg { background: #222; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user-msg { background: #fff; color: #000; align-self: flex-end; border-bottom-right-radius: 2px; }
        .input-area { padding: 15px; background: #111; border-top: 1px solid #333; display: flex; gap: 8px; }
        input { flex: 1; padding: 10px; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 10px; outline: none; }
        button { padding: 10px 15px; background: #fff; color: #000; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        /* Thinking Dots */
        .dot { width: 4px; height: 4px; background: #888; border-radius: 50%; display: inline-block; animation: bounce 1.4s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    </style>
</head>
<body>

<div id="ai-widget-wrapper">
    <div id="exit-modal">
        <div style="font-size: 24px; font-weight: bold;">Wait! 🚀</div>
        <div id="modal-promo" class="promo-code">FREE-DEMO</div>
        <button style="width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer;" onclick="toggleChat(); closeModal();">Claim Offer</button>
    </div>

    <div id="chat-bubble" onclick="toggleChat()">💬</div>

    <div id="chat-window">
        <div style="padding: 15px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; justify-content: space-between;">
            <b>Sales AI</b>
            <span onclick="toggleChat()" style="cursor:pointer">✕</span>
        </div>
        <div id="response-container"></div>
        <div class="input-area">
            <input id="msg" placeholder="Your name or email..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">Send</button>
        </div>
    </div>
</div>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQVsTHX1E0Jd-f2oVoNH8N2YXdzgPZcn6iwmHE7GM8-nvMkZxZ93KEtN0jyCd4iqu1NjvBvmcOx9eu7/pub?output=csv';
let SHEET_DATA = "";
let chatHistory = [];
let hasPopped = false;

async function loadData() {
    const res = await fetch(SHEET_URL + '&cb=' + Date.now());
    const csv = await res.text();
    SHEET_DATA = csv.split('\n').map(l => l.replace(/"/g, '').trim()).join(" | ");
    addMsg("ai", "Ready to scale? What is your full name and email to get started?");
}

function toggleChat() {
    const win = document.getElementById('chat-window');
    const bub = document.getElementById('chat-bubble');
    win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
    setTimeout(() => { win.classList.toggle('open'); bub.classList.toggle('active-spiral'); }, 10);
}

function closeModal() { document.getElementById('exit-modal').classList.remove('active'); }
document.addEventListener('mousemove', (e) => { if (e.clientY < 10 && !hasPopped) { document.getElementById('exit-modal').classList.add('active'); hasPopped = true; } });

function addMsg(role, text) {
    const container = document.getElementById("response-container");
    const div = document.createElement("div");
    div.className = `msg-bubble ${role}-msg`;
    div.innerText = text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
}

async function send() {
    const input = document.getElementById("msg");
    const text = input.value.trim();
    if (!text) return;

    addMsg("user", text);
    chatHistory.push({ role: "user", content: text });
    input.value = "";

    const aiDiv = addMsg("ai", "...");
    
    try {
        const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sheetData: SHEET_DATA, messages: chatHistory })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullReply = "";
        aiDiv.innerText = "";

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value);
            const lines = chunk.split("\n");
            for (const line of lines) {
                if (line.startsWith("data: ")) {
                    const json = JSON.parse(line.slice(6));
                    const content = json.choices[0]?.delta?.content;
                    if (content) {
                        fullReply += content;
                        aiDiv.innerText = fullReply;
                    }
                }
            }
        }
        chatHistory.push({ role: "assistant", content: fullReply });
    } catch (e) { aiDiv.innerText = "Connection lost. Please try again."; }
}
loadData();
</script>
</body>
</html>
