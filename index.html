<!DOCTYPE html>
<html>
<head>
    <title>AI Business Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; min-height: 100vh; }

        /* PERMANENT WINDOW (No more toggle logic) */
        #chat-window {
            position: fixed; 
            bottom: 25px; 
            right: 25px; 
            width: 360px; 
            height: 550px;
            background: #111; 
            border: 1px solid #333; 
            border-radius: 20px;
            display: flex; /* Always visible */
            flex-direction: column; 
            box-shadow: 0px 10px 40px rgba(0,0,0,0.8);
            z-index: 2147483647;
            overflow: hidden;
        }

        #chat-header { background: #1a1a1a; padding: 15px; border-bottom: 1px solid #333; }
        #response-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #050505; }
        
        .msg-bubble { padding: 10px 14px; border-radius: 15px; font-size: 14px; max-width: 85%; line-height: 1.4; }
        .ai-msg { background: #222; color: #fff; align-self: flex-start; border: 1px solid #333; }
        .user-msg { background: #fff; color: #000; align-self: flex-end; }

        .input-area { padding: 15px; background: #111; border-top: 1px solid #333; display: flex; gap: 8px; }
        input { flex: 1; padding: 10px; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 10px; outline: none; }
        .send-btn { padding: 10px 15px; background: #fff; color: #000; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat-window">
    <div id="chat-header">
        <b>AI Booking Assistant</b>
    </div>
    <div id="response-container">
        <div class="msg-bubble ai-msg">Hi! What's your <b>Name</b> and the <b>Service</b> you're looking for?</div>
    </div>
    <div class="input-area">
        <input id="msg" placeholder="Type a message..." />
        <button class="send-btn" id="send-trigger">Send</button>
    </div>
</div>

<script>
(function() {
    const _input = document.getElementById('msg');
    const _sendBtn = document.getElementById('send-trigger');
    const _container = document.getElementById('response-container');
    let _history = [];

    async function _handleSend() {
        const text = _input.value.trim();
        if (!text) return;

        _container.innerHTML += `<div class="msg-bubble user-msg">${text}</div>`;
        _history.push({ role: "user", content: text });
        _input.value = ""; 
        _container.scrollTop = _container.scrollHeight;

        const aiId = "ai-" + Date.now();
        _container.innerHTML += `<div id="${aiId}" class="msg-bubble ai-msg">...</div>`;

        try {
            const res = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages: _history }),
            });

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            const aiBubble = document.getElementById(aiId);
            aiBubble.innerText = ""; 

            let fullText = "";
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value);
                const lines = chunk.split("\n");
                for (const line of lines) {
                    if (line.startsWith("data: ")) {
                        const dataStr = line.replace("data: ", "").trim();
                        if (dataStr === "[DONE]") break;
                        try {
                            const data = JSON.parse(dataStr);
                            const content = data.choices[0].delta.content || "";
                            aiBubble.innerText += content;
                            fullText += content;
                            _container.scrollTop = _container.scrollHeight;
                        } catch (e) {}
                    }
                }
            }
            _history.push({ role: "assistant", content: fullText });
        } catch (err) {
            document.getElementById(aiId).innerText = "Error connecting to AI.";
        }
    }

    _sendBtn.addEventListener('click', _handleSend);
    _input.addEventListener('keypress', (e) => { if(e.key === 'Enter') _ai_handleSend(); });
})();
</script>
</body>
</html>
