<!DOCTYPE html>
<html>
<head>
    <title>AI Business Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; min-height: 100vh; }

        /* WIDGET WRAPPER */
        #ai-widget-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            z-index: 2147483647 !important;
        }

        /* DISCOUNT MODAL (Middle of screen) */
        #exit-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 90%;
            max-width: 400px;
            background: #111;
            border: 2px solid #00ff88;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            display: none; /* Hidden by default */
            flex-direction: column;
            align-items: center;
            box-shadow: 0px 0px 50px rgba(0, 255, 136, 0.3);
            pointer-events: auto;
            z-index: 2147483648;
            transition: all 0.3s ease;
        }

        #exit-modal.active { display: flex; transform: translate(-50%, -50%) scale(1); }

        .modal-offer { font-size: 24px; font-weight: bold; margin-bottom: 10px; color: #00ff88; }
        .modal-text { font-size: 16px; margin-bottom: 20px; color: #ccc; }
        .promo-code { background: #222; border: 1px dashed #00ff88; padding: 10px 20px; font-size: 20px; font-weight: bold; border-radius: 10px; margin-bottom: 20px; letter-spacing: 2px; }
        
        .close-modal-btn { background: #00ff88; color: #000; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .close-modal-btn:hover { background: #fff; transform: scale(1.05); }

        /* CHAT BUBBLE & WINDOW (Kept for your assistant) */
        #chat-bubble {
            position: absolute; bottom: 25px; right: 25px; width: 60px; height: 60px;
            background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; pointer-events: auto; box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        }
        .ai-icon-svg { width: 30px; height: 30px; fill: #000; }

        #chat-window {
            position: absolute; bottom: 95px; right: 25px; width: 360px; height: 500px;
            background: #111; border: 1px solid #333; border-radius: 20px;
            display: none; flex-direction: column; pointer-events: auto; overflow: hidden;
        }
        #chat-header { background: #1a1a1a; padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        #response-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #050505; }
        .message-row { display: flex; max-width: 85%; margin-bottom: 5px; }
        .ai-msg { background: #222; padding: 10px; border-radius: 10px; font-size: 14px; }
        .user-msg { background: #fff; color: #000; padding: 10px; border-radius: 10px; align-self: flex-end; font-size: 14px; }
        .input-area { padding: 15px; background: #111; display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 10px; }
    </style>
</head>
<body>

<div id="ai-widget-wrapper">
    <div id="exit-modal">
        <div class="modal-offer">Wait! Don't go yet! 🎁</div>
        <div class="modal-text">Get <b>20% OFF</b> your next order when you use this code at checkout:</div>
        <div class="promo-code">NEXT20</div>
        <button class="close-modal-btn" onclick="closeModal()">Claim Offer</button>
        <p style="font-size: 10px; color: #666; margin-top: 15px; cursor: pointer;" onclick="closeModal()">No thanks, I'll pay full price</p>
    </div>

    <div id="chat-bubble" onclick="toggleChat()">
        <svg class="ai-icon-svg" viewBox="0 0 24 24"><path d="M19,9L17.75,11.75L15,13L17.75,14.25L19,17L20.25,14.25L23,13L20.25,11.75L19,9M9,5L7,11L1,13L7,15L9,21L11,15L17,13L11,11L9,5M19,1L18.25,2.75L16.5,3.5L18.25,4.25L19,6L19.75,4.25L21.5,3.5L19.75,2.75L19,1Z" /></svg>
    </div>

    <div id="chat-window">
        <div id="chat-header">
            <b>AI Assistant</b>
            <span style="cursor:pointer" onclick="toggleChat()">✕</span>
        </div>
        <div id="response-container">
            <div class="ai-msg">Hi! How can I help you today?</div>
        </div>
        <div class="input-area">
            <input id="msg" placeholder="Message..." onkeypress="if(event.key === 'Enter') send()" />
            <button onclick="send()" style="background:#fff; border:none; padding:10px; border-radius:10px; cursor:pointer;">Send</button>
        </div>
    </div>
</div>

<script>
let hasPopped = false;

// MODAL CONTROLS
function closeModal() {
    document.getElementById('exit-modal').classList.remove('active');
}

// EXIT INTENT TRIGGER
document.addEventListener('mousemove', function(e) {
    // If mouse goes near top of screen (URL bar)
    if (e.clientY < 15 && !hasPopped) {
        document.getElementById('exit-modal').classList.add('active');
        hasPopped = true;
    }
});

// CHAT TOGGLE
function toggleChat() {
    const win = document.getElementById('chat-window');
    win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
}

// AI SEND LOGIC (Simplified for demo)
async function send() {
    const input = document.getElementById("msg");
    const container = document.getElementById("response-container");
    if (!input.value.trim()) return;

    container.innerHTML += `<div class="user-msg">${input.value}</div>`;
    input.value = "";
    container.scrollTop = container.scrollHeight;
    
    // You can re-add your fetch("/api/chat") logic here exactly like before!
}
</script>
</body>
</html>
