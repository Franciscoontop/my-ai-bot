<!DOCTYPE html>
<html>
<head>
    <title>AI Business Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: auto; min-height: 100vh; }

        /* Floating AI Bubble */
        #chat-bubble {
            position: fixed; bottom: 25px; right: 25px; width: 70px; height: 70px;
            background: #fff; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; cursor: pointer; z-index: 999;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0px 4px 20px rgba(255, 255, 255, 0.2);
        }

        #chat-bubble::after {
            content: ''; position: absolute; width: 110%; height: 110%; border-radius: 50%;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ff00ff, #00ffff);
            background-size: 400%; z-index: -1; filter: blur(10px); opacity: 0.3;
            animation: glow-rotate 8s linear infinite;
        }

        @keyframes glow-rotate { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .ai-icon-svg { width: 35px; height: 35px; fill: #000; animation: sparkle-dance 4s ease-in-out infinite; }
        @keyframes sparkle-dance { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* Chat Window */
        #chat-window {
            position: fixed; bottom: 110px; right: 25px; width: 360px; height: 550px;
            background: #111; border: 1px solid #333; border-radius: 20px;
            display: none; flex-direction: column; box-shadow: 0px 15px 50px rgba(0,0,0,0.9);
            z-index: 1000; overflow: hidden;
        }

        /* Specialized Header */
        #chat-header { 
            background: #1a1a1a; padding: 15px; border-bottom: 1px solid #333; 
            display: flex; justify-content: space-between; align-items: center;
        }
        
        .header-title { display: flex; align-items: center; gap: 10px; }
        .header-text b { display: block; font-size: 15px; color: #fff; }
        .header-text span { font-size: 11px; color: #00ff88; }

        #response-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #050505; }

        /* Message Rows */
        .message-row { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
        .ai-row { align-self: flex-start; flex-direction: row; }
        .user-row { align-self: flex-end; flex-direction: row-reverse; }

        .avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .ai-avatar { background: #fff; }
        .user-avatar { background: #333; font-size: 12px; font-weight: bold; color: #aaa; border: 1px solid #444; }
        .mini-icon { width: 16px; height: 16px; fill: #000; }

        .msg-bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .ai-msg { background: #222; color: #fff; border: 1px solid #333; border-bottom-left-radius: 4px; }
        .user-msg { background: #fff; color: #000; border-bottom-right-radius: 4px; }

        /* Lead Success Message */
        .lead-captured { 
            background: rgba(0, 255, 136, 0.1); 
            border: 1px dashed #00ff88; 
            color: #00ff88; 
            font-size: 12px; 
            padding: 10px; 
            text-align: center; 
            border-radius: 10px; 
            margin: 10px 0;
            line-height: 1.4;
        }

        .input-area { padding: 15px; background: #111; border-top: 1px solid #333; display: flex; gap: 8px; }
        input { flex: 1; padding: 10px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 10px; outline: none; }
        .send-btn { padding: 10px 15px; background: #fff; color: #000; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat-bubble" onclick="toggleChat()">
    <svg class="ai-icon-svg" viewBox="0 0 24 24"><path d="M19,9L17.75,11.75L15,13L17.75,14.25L19,17L20.25,14.25L23,13L20.25,11.75L19,9M9,5L7,11L1,13L7,15L9,21L11,15L17,13L11,11L9,5M19,1L18.25,2.75L16.5,3.5L18.25,4.25L19,6L19.75,4.25L21.5,3.5L19.75,2.75L19,1Z" /></svg>
</div>

<div id="chat-window">
    <div id="chat-header">
        <div class="header-title">
            <div class="avatar ai-avatar">
                <svg class="mini-icon" viewBox="0 0 24 24"><path d="M19,9L17.75,11.75L15,13L17.75,14.25L19,17L20.25,14.25L23,13L20.25,11.75L19,9M9,5L7,11L1,13L7,15L9,21L11,15L17,13L11,11L9,5M19,1L18.25,2.75L16.5,3.5L18.25,4.25L19,6L19.75,4.25L21.5,3.5L19.75,2.75L19,1Z" /></svg>
            </div>
            <div class="header-text">
                <b>AI Booking Assistant</b>
                <span>● Online 24/7</span>
            </div>
        </div>
        <span style="cursor:pointer; color:#888;" onclick="toggleChat()">✕</span>
    </div>
    <div id="response-container">
        <div class="message-row ai-row">
            <div class="avatar ai-avatar">
                <svg class="mini-icon" viewBox="0 0 24 24"><path d="M19,9L17.75,11.75L15,13L17.75,14.25L19,17L20.25,14.25L23,13L20.25,11.75L19,9M9,5L7,11L1,13L7,15L9,21L11,15L17,13L11,11L9,5M19,1L18.25,2.75L16.5,3.5L18.25,4.25L19,6L19.75,4.25L21.5,3.5L19.75,2.75L19,1Z" /></svg>
            </div>
            <div class="msg-bubble ai-msg">Hi! I'm here to help you get booked. Could I start with your <b>Name</b> and the <b>Service</b> you're interested in?</div>
        </div>
    </div>
    <div class="input-area">
        <input id="msg" placeholder="Tell me your name and what you need..." onkeypress="if(event.key === 'Enter') send()" />
        <button class="send-btn" onclick="send()">Send</button>
    </div>
</div>

<script>
// Tracker to ensure we trigger the organized email only once per session
let leadTracker = { isSent: false };

function toggleChat() {
    const win = document.getElementById('chat-window');
    win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
}

async function send() {
  const input = document.getElementById("msg");
  const container = document.getElementById("response-container");
  const message = input.value;
  if (!message) return;

  // Add User Row
  container.innerHTML += `<div class="message-row user-row"><div class="avatar user-avatar">U</div><div class="msg-bubble user-msg">${message}</div></div>`;
  
  const aiBubbleId = "ai-" + Date.now();
  // Add AI Row
  container.innerHTML += `<div class="message-row ai-row"><div class="avatar ai-avatar"><svg class="mini-icon" viewBox="0 0 24 24"><path d="M19,9L17.75,11.75L15,13L17.75,14.25L19,17L20.25,14.25L23,13L20.25,11.75L19,9M9,5L7,11L1,13L7,15L9,21L11,15L17,13L11,11L9,5M19,1L18.25,2.75L16.5,3.5L18.25,4.25L19,6L19.75,4.25L21.5,3.5L19.75,2.75L19,1Z" /></svg></div><div id="${aiBubbleId}" class="msg-bubble ai-msg">...</div></div>`;
  
  input.value = ""; 
  container.scrollTop = container.scrollHeight;

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ 
          message,
          system_prompt: "You are a professional Booking Coordinator. Your goal is to collect: 1. Customer Name, 2. Specific Service, 3. Phone Number, and 4. Preferred Day/Time. Be helpful and polite. Once you have a phone number and a time mention, confirm that you are sending the booking request to the owner."
      }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    const aiBubble = document.getElementById(aiBubbleId);
    aiBubble.innerHTML = ""; 

    let fullResponse = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split("\n");
      for (const line of lines) {
        if (line.startsWith("data: ")) {
          const dataStr = line.replace("data: ", "").trim();
          if (dataStr === "[DONE]") break;
          try {
            const data = JSON.parse(dataStr);
            const content = data.choices[0].delta.content || "";
            aiBubble.innerHTML += content;
            fullResponse += content;
            container.scrollTop = container.scrollHeight;
          } catch (e) {}
        }
      }
    }

    // --- SMART BOOKING DETECTION ---
    const phoneRegex = /(\d{3}[-\s.]?\d{3}[-\s.]?\d{4})|(\(\d{3}\)\s?\d{3}[-\s.]?\d{4})/;
    const timeRegex = /(monday|tuesday|wednesday|thursday|friday|saturday|sunday|tomorrow|today|at \d|pm|am|clock)/i;
    
    const combinedText = (message + fullResponse).toLowerCase();
    const foundPhone = combinedText.match(phoneRegex);
    const foundTime = combinedText.match(timeRegex);

    if (foundPhone && foundTime && !leadTracker.isSent) {
        leadTracker.isSent = true; 
        
        // Push ORGANIZED data to Zapier
        fetch("https://hooks.zapier.com/hooks/catch/27378409/uvukyhr/", {
            method: "POST",
            body: JSON.stringify({ 
                type: "NEW BOOKING REQUEST",
                phone: foundPhone[0],
                transcript: container.innerText, // Sends full conversation context for the email
                alert_level: "High",
                captured_at: new Date().toLocaleString()
            })
        }).then(() => {
            container.innerHTML += `<div class="lead-captured">📅 Booking Request Sent! <br>The owner will review your details and confirm shortly.</div>`;
            container.scrollTop = container.scrollHeight;
        });
    }

  } catch (err) {
    document.getElementById(aiBubbleId).innerText = "Connection lost. Please refresh.";
  }
}
</script>

</body>
</html>
