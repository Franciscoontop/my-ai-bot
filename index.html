<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<script>
(function() {
    // 1. Create the Styles in a protected tag
    const style = document.createElement('style');
    style.innerHTML = `
        #ai-master-container { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        /* THE BUBBLE */
        .floating-ai-btn {
            position: fixed !important; bottom: 20px !important; right: 20px !important;
            width: 60px !important; height: 60px !important;
            background: #ffffff !important; border-radius: 50% !important;
            display: flex !important; align-items: center !important; justify-content: center !important;
            cursor: pointer !important; z-index: 2147483647 !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }
        
        /* MINIMAL GLOW */
        .floating-ai-btn::after {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 50%; background: linear-gradient(45deg, #00d2ff, #92fe9d);
            z-index: -1; opacity: 0.3; filter: blur(8px);
        }

        .floating-ai-btn:hover { transform: scale(1.05) translateY(-2px); }

        /* THE CHAT WINDOW */
        .ai-chat-card {
            position: fixed !important; bottom: 90px !important; right: 20px !important;
            width: 350px !important; height: 500px !important;
            background: #000000 !important; border: 1px solid #333 !important;
            border-radius: 20px !important; z-index: 2147483647 !important;
            display: none; /* Controlled by State */
            flex-direction: column !important; overflow: hidden !important;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6) !important;
        }

        .ai-card-active { display: flex !important; animation: popIn 0.3s ease-out; }

        @keyframes popIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        #ai-msg-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #0a0a0a; }
        .ai-input-wrap { padding: 15px; background: #111; display: flex; gap: 8px; border-top: 1px solid #222; }
        .ai-input-wrap input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 10px; outline: none; }
        .ai-send-btn { background: #fff; border: none; padding: 0 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        .bubble { padding: 10px 14px; border-radius: 15px; font-size: 14px; max-width: 80%; line-height: 1.4; }
        .ai-bubble { background: #222; color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user-bubble { background: #fff; color: #000; align-self: flex-end; border-bottom-right-radius: 2px; }
    `;
    document.head.appendChild(style);

    // 2. Build the HTML Structure
    const container = document.createElement('div');
    container.id = "ai-master-container";
    container.innerHTML = `
        <div class="floating-ai-btn" id="ai-toggle">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        </div>
        <div class="ai-chat-card" id="ai-window">
            <div style="padding:15px; background:#111; border-bottom:1px solid #222; font-weight:bold; color:white; display:flex; justify-content:space-between;">
                <span>Assistant</span>
                <span id="ai-close" style="cursor:pointer; color:#666;">✕</span>
            </div>
            <div id="ai-msg-area">
                <div class="bubble ai-bubble">Hi! I'm here to help. What's your <b>Name</b> and the <b>Service</b> you're looking for?</div>
            </div>
            <div class="ai-input-wrap">
                <input type="text" id="ai-input-field" placeholder="Message...">
                <button class="ai-send-btn" id="ai-send-trigger">Send</button>
            </div>
        </div>
    `;
    document.body.appendChild(container);

    // 3. The Logic
    const toggle = document.getElementById('ai-toggle');
    const win = document.getElementById('ai-window');
    const close = document.getElementById('ai-close');
    const input = document.getElementById('ai-input-field');
    const sendBtn = document.getElementById('ai-send-trigger');
    const msgArea = document.getElementById('ai-msg-area');

    let history = [];

    // TOGGLE WINDOW
    const handleToggle = (e) => {
        e.preventDefault();
        e.stopPropagation();
        win.classList.toggle('ai-card-active');
    };

    toggle.addEventListener('click', handleToggle);
    close.addEventListener('click', () => win.classList.remove('ai-card-active'));

    // SEND MESSAGE
    async function sendMessage() {
        const text = input.value.trim();
        if(!text) return;

        // Add User Message
        msgArea.innerHTML += `<div class="bubble user-bubble">${text}</div>`;
        history.push({role: "user", content: text});
        input.value = "";
        msgArea.scrollTop = msgArea.scrollHeight;

        // AI Placeholder
        const aiId = "ai-" + Date.now();
        msgArea.innerHTML += `<div class="bubble ai-bubble" id="${aiId}">...</div>`;

        try {
            const res = await fetch("/api/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({messages: history})
            });

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            const aiBubble = document.getElementById(aiId);
            aiBubble.innerText = "";
            let fullText = "";

            while (true) {
                const {done, value} = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value);
                const lines = chunk.split("\n");
                for (const line of lines) {
                    if (line.startsWith("data: ")) {
                        const dataStr = line.replace("data: ", "").trim();
                        if (dataStr === "[DONE]") break;
                        try {
                            const data = JSON.parse(dataStr);
                            const content = data.choices[0].delta.content || "";
                            aiBubble.innerText += content;
                            fullText += content;
                            msgArea.scrollTop = msgArea.scrollHeight;
                        } catch (e) {}
                    }
                }
            }
            history.push({role: "assistant", content: fullText});
        } catch (e) {
            document.getElementById(aiId).innerText = "Sorry, I'm having trouble connecting.";
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

})();
</script>

</body>
</html>
