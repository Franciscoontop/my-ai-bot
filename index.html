<!DOCTYPE html>
<html>
<head>
    <title>AI Business Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        /* Base Dark Theme */
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            padding: 20px; 
            line-height: 1.6; 
            max-width: 800px; 
            margin: auto; 
            min-height: 100vh;
        }

        h1 { border-bottom: 1px solid #333; padding-bottom: 10px; color: #fff; }

        /* Floating AI Bubble */
        #chat-bubble {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 65px;
            height: 65px;
            background: #fff;
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0px 4px 15px rgba(255, 255, 255, 0.1);
            z-index: 999;
            transition: all 0.3s ease;
            font-size: 28px;
        }

        /* Glow on Hover */
        #chat-bubble:hover {
            transform: scale(1.1);
            box-shadow: 0px 0px 25px 8px rgba(255, 255, 255, 0.4);
        }

        #bubble-label {
            position: absolute;
            right: 80px;
            background: #222;
            color: #fff;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 14px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            border: 1px solid #444;
        }
        #chat-bubble:hover #bubble-label { opacity: 1; }

        /* Floating Chat Window */
        #chat-window {
            position: fixed;
            bottom: 100px;
            right: 25px;
            width: 330px;
            height: 480px;
            background: #111;
            border: 1px solid #333;
            border-radius: 16px;
            display: none; 
            flex-direction: column;
            box-shadow: 0px 10px 40px rgba(0,0,0,0.9);
            z-index: 1000;
            overflow: hidden;
        }

        #chat-header { background: #1a1a1a; padding: 15px; font-weight: bold; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        
        #response-container { 
            flex: 1; 
            padding: 15px; 
            overflow-y: auto; 
            font-size: 14px; 
            background: #050505;
            color: #ddd;
        }

        .input-area { padding: 15px; background: #111; border-top: 1px solid #333; display: flex; gap: 8px; }
        
        input { 
            flex: 1; 
            padding: 10px; 
            background: #1a1a1a; 
            border: 1px solid #333; 
            color: #fff; 
            border-radius: 6px;
        }

        .send-btn { 
            padding: 10px 15px; 
            background: #fff; 
            color: #000; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
        }

        /* --- THE POPUP FIX --- */
        #ai-popup { 
            position: fixed; 
            top: 50%;
            left: 50%;
            transform: translate(-50%, -40%); /* Start slightly lower for animation */
            width: 320px; 
            background: #1a1a1a; 
            border: 2px solid #fff; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0px 0px 100px rgba(0,0,0,1); 
            z-index: 10001; /* Must be higher than chat */
            text-align: center;
            
            /* Hidden by default */
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* When the 'show' class is added */
        #ai-popup.show {
            visibility: visible !important;
            opacity: 1 !important;
            transform: translate(-50%, -50%) !important;
        }

        .close-x { cursor: pointer; position: absolute; top: 12px; right: 18px; color: #666; font-size: 24px; }
        .close-x:hover { color: #fff; }

        .popup-btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Agency Dashboard</h1>
<p>The AI assistant is active in the bottom right. Move your mouse to the top of the window to test the exit-intent popup.</p>

<div id="chat-bubble" onclick="toggleChat()">
    <span id="bubble-label">Talk to me!</span>
    🤖
</div>

<div id="chat-window">
    <div id="chat-header">
        <span>AI Assistant</span>
        <span style="cursor:pointer" onclick="toggleChat()">✕</span>
    </div>
    <div id="response-container">Ready to help. What's on your mind?</div>
    <div class="input-area">
        <input id="msg" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') send()" />
        <button class="send-btn" onclick="send()">Send</button>
    </div>
</div>

<div id="ai-popup">
    <span class="close-x" onclick="closePopup()">×</span>
    <p style="font-size: 1.2em;"><strong>Wait!</strong> 🤖</p>
    <p>Before you go, would you like a **20% discount** on your first month?</p>
    <button class="popup-btn" onclick="closePopup()">Claim My Discount</button>
</div>

<script>
let hasSentLead = false;

// Toggle Chat Window
function toggleChat() {
    const win = document.getElementById('chat-window');
    win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
}

// AI Chat Send Logic
async function send() {
  const input = document.getElementById("msg");
  const container = document.getElementById("response-container");
  const message = input.value;
  if (!message) return;

  container.innerHTML += `<div style="margin-bottom:10px;"><b>You:</b> ${message}</div>`;
  container.innerHTML += `<div id="current-ai" style="margin-bottom:10px;"><b>AI:</b> Thinking...</div>`;
  input.value = ""; 
  container.scrollTop = container.scrollHeight;

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    const aiResponseDiv = document.getElementById("current-ai");
    aiResponseDiv.innerHTML = "<b>AI:</b> "; 

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split("\n");

      for (const line of lines) {
        if (line.startsWith("data: ")) {
          const dataStr = line.replace("data: ", "").trim();
          if (dataStr === "[DONE]") break;
          try {
            const data = JSON.parse(dataStr);
            const content = data.choices[0].delta.content || "";
            aiResponseDiv.innerHTML += content;
            container.scrollTop = container.scrollHeight;

            // Simple Phone Lead Capture
            const phoneRegex = /(\d{3}[-\s.]?\d{3}[-\s.]?\d{4})/;
            const foundPhone = aiResponseDiv.innerText.match(phoneRegex);
            if (foundPhone && !hasSentLead) {
                hasSentLead = true; 
                fetch("https://hooks.zapier.com/hooks/catch/27378409/uvukyhr/", {
                    method: "POST",
                    body: JSON.stringify({ phone: foundPhone[0], chat: aiResponseDiv.innerText })
                });
            }
          } catch (e) {}
        }
      }
    }
    aiResponseDiv.id = ""; // Reset ID for next message
  } catch (err) {
    container.innerHTML += `<div>Error: ${err.message}</div>`;
  }
}

// --- UPDATED POPUP LOGIC ---
function showPopup() {
    const popup = document.getElementById('ai-popup');
    const wasClosed = localStorage.getItem('exitPopupClosed');
    
    if (popup && !wasClosed) {
        console.log("Triggering Popup");
        popup.classList.add('show');
    }
}

function closePopup() {
    const popup = document.getElementById('ai-popup');
    popup.classList.remove('show');
    localStorage.setItem('exitPopupClosed', 'true');
}

// Triggers
document.addEventListener("mouseleave", function(e) {
    if (e.clientY < 0) showPopup();
});

document.addEventListener("mousemove", function(e) {
    if (e.clientY < 5) showPopup();
});
</script>

</body>
</html>
