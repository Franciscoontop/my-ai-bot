<!DOCTYPE html>
<html>
<head>
    <title>AI Business Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 600px; margin: auto; }
        #response { white-space: pre-wrap; background: #f4f4f4; padding: 15px; border-radius: 8px; min-height: 50px; border: 1px solid #ddd; }
        input { padding: 10px; width: 70%; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; cursor: pointer; background: #000; color: #fff; border: none; border-radius: 5px; }
        .review-box { text-align: center; margin-top: 40px; padding: 20px; border-top: 1px solid #eee; }
        
        /* POPUP CORE STYLES */
        #ai-popup { 
            position: fixed; 
            bottom: 80px; 
            right: 20px; 
            width: 280px; 
            background: white; 
            border: 3px solid #000; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5); 
            z-index: 10000;
            
            /* Hidden State */
            opacity: 0;
            visibility: hidden;
            transform: translateY(30px);
            transition: all 0.5s ease-in-out;
        }

        /* Visible State */
        #ai-popup.show {
            visibility: visible !important;
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        .close-btn {
            position: absolute;
            top: 5px;
            right: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 24px;
            color: #888; /* Changed from red to neutral grey */
        }
        .close-btn:hover { color: #000; }
    </style>
</head>
<body>

<h1>AI Business Assistant</h1>

<div style="margin-bottom: 20px;">
    <input id="msg" placeholder="Ask about our services..." />
    <button onclick="send()">Send</button>
</div>

<div id="response">Your AI assistant is ready!</div>

<div id="ai-popup">
    <span class="close-btn" onclick="closePopup()">×</span>
    <p><strong>Wait!</strong> 🤖 20% discount detected for you!</p>
    <button onclick="closePopup()" style="width:100%;">Close</button>
</div>

<div class="review-box">
   <p>Happy with our service?</p>
   <a href="https://docs.google.com/document/d/10tkUO6lDqPb57OPWiHVjpNjezC6L1YQN3L6h3I9r-qU/edit?tab=t.0" target="_blank" style="text-decoration:none; color:blue; font-weight:bold; font-size: 1.2em;">
     ⭐ Leave us a Google Review
   </a>
</div>

<script>
let hasSentLead = false;

// --- AI CHAT LOGIC ---
async function send() {
  const input = document.getElementById("msg");
  const responseElement = document.getElementById("response");
  const message = input.value;
  if (!message) return;

  responseElement.innerText = "Connecting..."; 
  input.value = ""; 

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    responseElement.innerText = ""; 

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split("\n");

      for (const line of lines) {
        if (line.startsWith("data: ")) {
          const dataStr = line.replace("data: ", "").trim();
          if (dataStr === "[DONE]") break;

          try {
            const data = JSON.parse(dataStr);
            const content = data.choices[0].delta.content || "";
            responseElement.innerText += content;

            const phoneRegex = /(\d{3}[-\s.]?\d{3}[-\s.]?\d{4})/;
            const foundPhone = responseElement.innerText.match(phoneRegex);

            if (foundPhone && !hasSentLead) {
                hasSentLead = true; 
                fetch("https://hooks.zapier.com/hooks/catch/27378409/uvukyhr/", {
                    method: "POST",
                    body: JSON.stringify({ phone: foundPhone[0], full_chat: responseElement.innerText })
                });
            }
          } catch (e) {}
        }
      }
    }
  } catch (err) {
    responseElement.innerText = "Error: " + err.message;
  }
}

// --- POPUP LOGIC ---
function showPopup() {
    console.log("showPopup function called!");
    const popup = document.getElementById('ai-popup');
    popup.classList.add('show');
}

function closePopup() {
    console.log("closePopup function called!");
    const popup = document.getElementById('ai-popup');
    popup.classList.remove('show');
    // Note: I left localStorage OUT so you can test it every time you refresh.
}

// TRIGGER 1: Mouse leaves top
document.addEventListener("mouseleave", function(e) {
    if (e.clientY < 0) { 
        console.log("Mouse left the top!");
        showPopup();
    }
});

// TRIGGER 2: Proximity to top (triggers when mouse hits the top 5 pixels)
document.addEventListener("mousemove", function(e) {
    if (e.clientY < 5) {
        showPopup();
    }
});
</script>

</body>
</html>
