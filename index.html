<!DOCTYPE html>
<html>
<head>
    <title>AI Business Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="font-family: sans-serif; padding: 20px; line-height: 1.6;">

<h1>AI Business Assistant</h1>

<div style="margin-bottom: 20px;">
    <input id="msg" placeholder="Ask about our services..." style="padding: 10px; width: 70%;" />
    <button onclick="send()" style="padding: 10px 20px; cursor: pointer;">Send</button>
</div>

<div id="response" style="white-space: pre-wrap; background: #f4f4f4; padding: 15px; border-radius: 8px; min-height: 50px;"></div>

<script>
async function send() {
  const input = document.getElementById("msg");
  const responseElement = document.getElementById("response");
  const message = input.value;
  
  if (!message) return;

  responseElement.innerText = "Connecting..."; 
  input.value = ""; 

  try {
    const res = await fetch("/.netlify/functions/chat", {
      method: "POST",
      body: JSON.stringify({ message }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    responseElement.innerText = ""; 

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value);
      // Clean up the NVIDIA data stream format
      const lines = chunk.split("\n");

      for (const line of lines) {
        if (line.startsWith("data: ")) {
          const dataStr = line.replace("data: ", "").trim();
          if (dataStr === "[DONE]") break;

          try {
            const data = JSON.parse(dataStr);
            const content = data.choices[0].delta.content || "";
            responseElement.innerText += content; 
          } catch (e) {
            // Ignore partial chunks or empty lines
          }
        }
      }
    }
  } catch (err) {
    responseElement.innerText = "Error: " + err.message;
  }
}
</script>

<div id="ai-popup" style="display:none; position:fixed; bottom:80px; right:20px; width:300px; background:white; border:2px solid #000; padding:15px; border-radius:15px; box-shadow: 0px 10px 30px rgba(0,0,0,0.2); z-index:1000;">
    <p><strong>Wait!</strong> 🤖 Before you go, did you know we have a 20% discount for new clients this week?</p>
    <button onclick="document.getElementById('ai-popup').style.display='none'" style="background:#000; color:#fff; border:none; padding:5px 10px; cursor:pointer;">Ask AI about it</button>
</div>

<script>
// Show popup after 15 seconds (Engaged visitor)
setTimeout(() => {
    const popup = document.getElementById('ai-popup');
    if(popup) popup.style.display = 'block';
}, 15000);

// Show popup if they try to leave (Exit Intent)
document.addEventListener("mouseleave", function(e){
    if(e.clientY < 0) {
        const popup = document.getElementById('ai-popup');
        if(popup) popup.style.display = 'block';
    }
}, false);
</script>

</body>
</html>
