<!DOCTYPE html>
<html>
<head>
    <title>AI Assistant</title>
    <style>
        body { background: #000; margin: 0; }
    </style>
</head>
<body>

<script>
window.onload = function() {
    // 1. CREATE ELEMENTS
    const root = document.createElement('div');
    root.id = "ai-widget-root";
    document.body.appendChild(root);

    root.innerHTML = `
        <div id="chat-bubble" style="position:fixed; bottom:25px; right:25px; width:65px; height:65px; background:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:9999999; box-shadow:0 5px 20px rgba(0,0,0,0.5); transition:transform 0.2s;">
            <svg style="width:30px; height:30px; fill:#000" viewBox="0 0 24 24"><path d="M19,9L17.75,11.75L15,13L17.75,14.25L19,17L20.25,14.25L23,13L20.25,11.75L19,9M9,5L7,11L1,13L7,15L9,21L11,15L17,13L11,11L9,5M19,1L18.25,2.75L16.5,3.5L18.25,4.25L19,6L19.75,4.25L21.5,3.5L19.75,2.75L19,1Z" /></svg>
            <div id="bubble-glow" style="position:absolute; width:100%; height:100%; border-radius:50%; background:linear-gradient(45deg, #ff00ff, #00ffff); z-index:-1; filter:blur(10px); opacity:0.2;"></div>
        </div>
        <div id="chat-window" style="position:fixed; bottom:100px; right:25px; width:360px; height:550px; background:#111; border:1px solid #333; border-radius:20px; display:none; flex-direction:column; z-index:9999999; overflow:hidden; box-shadow:0 10px 40px rgba(0,0,0,0.8); color:white; font-family:sans-serif;">
            <div style="padding:15px; background:#1a1a1a; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #333;">
                <span>AI Booking Assistant</span>
                <span id="close-chat" style="cursor:pointer; color:#888;">✕</span>
            </div>
            <div id="chat-scroller" style="flex:1; padding:15px; overflow-y:auto; background:#050505; display:flex; flex-direction:column; gap:10px;">
                <div style="align-self:flex-start; background:#222; padding:10px; border-radius:15px; font-size:14px; max-width:85%;">Hi! Please tell me your <b>Name</b> and the <b>Service</b> you need.</div>
            </div>
            <div style="padding:15px; background:#111; display:flex; gap:8px; border-top:1px solid #333;">
                <input id="chat-input" type="text" placeholder="Type here..." style="flex:1; background:#1a1a1a; border:1px solid #444; color:#fff; padding:10px; border-radius:10px; outline:none;">
                <button id="chat-send" style="background:#fff; color:#000; border:none; padding:10px 15px; border-radius:10px; font-weight:bold; cursor:pointer;">Send</button>
            </div>
        </div>
    `;

    // 2. LOGIC
    const bubble = document.getElementById('chat-bubble');
    const win = document.getElementById('chat-window');
    const close = document.getElementById('close-chat');
    const input = document.getElementById('chat-input');
    const send = document.getElementById('chat-send');
    const scroller = document.getElementById('chat-scroller');

    let history = [];
    let leadCaptured = false;

    // Toggle Function
    bubble.onclick = (e) => {
        e.stopPropagation();
        win.style.display = (win.style.display === 'none' || win.style.display === '') ? 'flex' : 'none';
    };

    close.onclick = () => win.style.display = 'none';

    // Send Logic
    async function handleChat() {
        const msg = input.value.trim();
        if(!msg) return;

        // Add User Msg
        scroller.innerHTML += `<div style="align-self:flex-end; background:#fff; color:#000; padding:10px; border-radius:15px; font-size:14px; max-width:85%;">${msg}</div>`;
        history.push({ role: "user", content: msg });
        input.value = "";
        scroller.scrollTop = scroller.scrollHeight;

        // Add AI Loading
        const aiId = "ai-" + Date.now();
        scroller.innerHTML += `<div id="${aiId}" style="align-self:flex-start; background:#222; padding:10px; border-radius:15px; font-size:14px; max-width:85%;">...</div>`;

        try {
            const res = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages: history }),
            });

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            const bubbleEl = document.getElementById(aiId);
            bubbleEl.innerText = "";
            let fullText = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value);
                const lines = chunk.split("\n");
                for (const line of lines) {
                    if (line.startsWith("data: ")) {
                        const dataStr = line.replace("data: ", "").trim();
                        if (dataStr === "[DONE]") break;
                        try {
                            const data = JSON.parse(dataStr);
                            const content = data.choices[0].delta.content || "";
                            bubbleEl.innerText += content;
                            fullText += content;
                        } catch (e) {}
                    }
                }
            }
            history.push({ role: "assistant", content: fullText });
            scroller.scrollTop = scroller.scrollHeight;
            
            // LEAD LOGIC
            const phoneRx = /(\d{3}[-\s.]?\d{3}[-\s.]?\d{4})/;
            if(phoneRx.test(msg + fullText) && !leadCaptured) {
                leadCaptured = true;
                const nameMatch = history.find(m => m.role === "user").content.split(' ')[0];
                fetch("https://hooks.zapier.com/hooks/catch/27378409/uvukyhr/", {
                    method: "POST",
                    body: JSON.stringify({ name: nameMatch, phone: (msg+fullText).match(phoneRx)[0] })
                });
                scroller.innerHTML += `<div style="text-align:center; color:#00ff88; font-size:12px; margin:5px;">Booking Request Sent!</div>`;
            }
        } catch (e) {
            document.getElementById(aiId).innerText = "Error connecting.";
        }
    }

    send.onclick = handleChat;
    input.onkeypress = (e) => { if(e.key === 'Enter') handleChat(); };
};
</script>

</body>
</html>
