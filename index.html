 <html>
<head>
    <title>AI Business Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>

        body { background-color: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; }


        #ai-widget-wrapper {

            position: fixed;

            top: 0;

            left: 0;

            width: 100vw;

            height: 100vh;

            pointer-events: none; 

            z-index: 2147483647 !important;

        }


        /* BUBBLE */

        #chat-bubble {

            position: absolute; 

            bottom: 25px; 

            right: 25px; 

            width: 60px; 

            height: 60px;

            background: #fff; 

            border-radius: 50%; 

            display: flex; 

            align-items: center;

            justify-content: center; 

            cursor: pointer; 

            pointer-events: auto;

            transition: transform 0.2s ease;

            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);

        }


        /* MINIMAL GLOW - Clean and tight */

        #chat-bubble::after {

            content: ''; 

            position: absolute; 

            width: 100%; height: 100%; 

            border-radius: 50%;

            background: linear-gradient(45deg, #00ffff, #ff00ff);

            z-index: -1; 

            filter: blur(10px);

            opacity: 0.15; /* Even more minimal */

        }


        #chat-bubble:hover { transform: scale(1.1); }


        /* CHAT WINDOW */

        #chat-window {

            position: absolute; 

            bottom: 95px; 

            right: 25px; 

            width: 360px; 

            height: 550px;

            background: #111; 

            border: 1px solid #333; 

            border-radius: 20px;

            display: none; /* Flex via JS */

            flex-direction: column; 

            pointer-events: auto;

            box-shadow: 0px 20px 60px rgba(0,0,0,1);

            overflow: hidden;

            /* Animation for the "Pop" */

            animation: slideUp 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);

        }


        @keyframes slideUp {

            from { opacity: 0; transform: translateY(30px); }

            to { opacity: 1; transform: translateY(0); }

        }


        #chat-header { background: #1a1a1a; padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }

        #response-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #050505; }

        

        .msg-bubble { padding: 10px 14px; border-radius: 15px; font-size: 14px; max-width: 85%; line-height: 1.4; }

        .ai-msg { background: #222; color: #fff; align-self: flex-start; border: 1px solid #333; }

        .user-msg { background: #fff; color: #000; align-self: flex-end; }


        .input-area { padding: 15px; background: #111; border-top: 1px solid #333; display: flex; gap: 8px; }

        input { flex: 1; padding: 10px; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 10px; outline: none; }

        .send-btn { padding: 10px 15px; background: #fff; color: #000; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }

    </style>

</head>

<body>


<div id="ai-widget-wrapper">

    <div id="chat-bubble">

        <svg width="28" height="28" viewBox="0 0 24 24"><path d="M19,9L17.75,11.75L15,13L17.75,14.25L19,17L20.25,14.25L23,13L20.25,11.75L19,9M9,5L7,11L1,13L7,15L9,21L11,15L17,13L11,11L9,5M19,1L18.25,2.75L16.5,3.5L18.25,4.25L19,6L19.75,4.25L21.5,3.5L19.75,2.75L19,1Z" /></svg>

    </div>


    <div id="chat-window">

        <div id="chat-header">

            <b>AI Booking Assistant</b>

            <span style="cursor:pointer; color:#888;" id="close-chat">✕</span>

        </div>

        <div id="response-container">

            <div class="msg-bubble ai-msg">Hi! What's your <b>Name</b> and the <b>Service</b> you're looking for?</div>

        </div>

        <div class="input-area">

            <input id="msg" placeholder="Type a message..." />

            <button class="send-btn" id="send-trigger">Send</button>

        </div>

    </div>

</div>


<script>

const bubble = document.getElementById('chat-bubble');

const win = document.getElementById('chat-window');

const closeBtn = document.getElementById('close-chat');

const input = document.getElementById('msg');

const sendBtn = document.getElementById('send-trigger');

const container = document.getElementById('response-container');


let chatHistory = [];

let leadSent = false;


// 1. CLICK TOGGLE

bubble.addEventListener('click', () => {

    win.style.display = 'flex';

});


closeBtn.addEventListener('click', (e) => {

    e.stopPropagation();

    win.style.display = 'none';

});


// 2. THE EDGE TRIGGER (NO COOLDOWN)

// This monitors the mouse moving toward the URL bar/tab area

document.addEventListener('mouseleave', (e) => {

    if (e.clientY <= 0) { // If mouse moves above the website top border

        win.style.display = 'flex';

    }

});


// 3. SEND LOGIC

async function send() {

    const text = input.value.trim();

    if (!text) return;


    container.innerHTML += `<div class="msg-bubble user-msg">${text}</div>`;

    chatHistory.push({ role: "user", content: text });

    input.value = ""; 

    container.scrollTop = container.scrollHeight;


    const aiId = "ai-" + Date.now();

    container.innerHTML += `<div id="${aiId}" class="msg-bubble ai-msg">...</div>`;


    try {

        const res = await fetch("/api/chat", {

            method: "POST",

            headers: { "Content-Type": "application/json" },

            body: JSON.stringify({ messages: chatHistory }),

        });


        const reader = res.body.getReader();

        const decoder = new TextDecoder();

        const aiBubble = document.getElementById(aiId);

        aiBubble.innerText = ""; 


        let fullText = "";

        while (true) {

            const { done, value } = await reader.read();

            if (done) break;

            const chunk = decoder.decode(value);

            const lines = chunk.split("\n");

            for (const line of lines) {

                if (line.startsWith("data: ")) {

                    const dataStr = line.replace("data: ", "").trim();

                    if (dataStr === "[DONE]") break;

                    try {

                        const data = JSON.parse(dataStr);

                        const content = data.choices[0].delta.content || "";

                        aiBubble.innerText += content;

                        fullText += content;

                    } catch (e) {}

                }

            }

        }

        chatHistory.push({ role: "assistant", content: fullText });

        container.scrollTop = container.scrollHeight;

    } catch (err) {

        document.getElementById(aiId).innerText = "Error. Please refresh.";

    }

}


sendBtn.addEventListener('click', send);

input.addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });


</script>

</body>

</html>
