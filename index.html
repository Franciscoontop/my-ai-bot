<!DOCTYPE html>
<html>
<head>
    <title>AI Chat</title>
</head>
<body>

<h1>My AI Chatbot</h1>

<input id="msg" placeholder="Type something..." />
<button onclick="send()">Send</button>

<p id="response" style="white-space: pre-wrap;"></p> <script>
async function send() {
  const input = document.getElementById("msg");
  const responseElement = document.getElementById("response");
  const message = input.value;
  
  if (!message) return;

  responseElement.innerText = "Connecting..."; // Feedback for the user
  input.value = ""; 

  try {
    const res = await fetch("/.netlify/functions/chat", {
      method: "POST",
      body: JSON.stringify({ message }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    responseElement.innerText = ""; // Clear the "Connecting..." message once words start arriving

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value);
      const lines = chunk.split("\n");

      for (const line of lines) {
        if (line.startsWith("data: ") && line !== "data: [DONE]") {
          try {
            const data = JSON.parse(line.slice(6));
            const content = data.choices[0].delta.content || "";
            responseElement.innerText += content; 
          } catch (e) {
            // Skips incomplete data chunks
          }
        }
      }
    }
  } catch (err) {
    responseElement.innerText = "Error: " + err.message;
  }
}
</script>

</body>
</html>
