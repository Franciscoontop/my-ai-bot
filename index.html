<!DOCTYPE html>
<html>
<head>
    <title>AI Business Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; min-height: 100vh; }

        #ai-widget-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            z-index: 2147483647 !important;
        }

        /* --- SMOOTH DISCOUNT MODAL --- */
        #exit-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            /* Starts slightly lower and smaller for a "lift" effect */
            transform: translate(-50%, -45%) scale(0.95);
            width: 90%;
            max-width: 400px;
            background: #111;
            border: 1px solid #333;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0px 30px 60px rgba(0,0,0,0.9);
            pointer-events: none; /* Keeps it non-interactable while hidden */
            z-index: 2147483648;
            
            /* The Secret to Smoothness: Hidden but transitionable */
            opacity: 0;
            visibility: hidden;
            transition: 
                opacity 0.5s ease, 
                transform 0.5s cubic-bezier(0.165, 0.84, 0.44, 1), 
                visibility 0.5s;
        }

        /* Active State */
        #exit-modal.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }

        .modal-offer { font-size: 26px; font-weight: bold; margin-bottom: 12px; color: #fff; }
        .modal-text { font-size: 16px; margin-bottom: 24px; color: #aaa; line-height: 1.5; }
        .promo-code { 
            background: #1a1a1a; 
            border: 1px dashed #444; 
            padding: 12px 24px; 
            font-size: 22px; 
            font-weight: bold; 
            border-radius: 12px; 
            margin-bottom: 24px;
            color: #fff;
        }
        
        .close-modal-btn { 
            background: #fff; 
            color: #000; 
            border: none; 
            padding: 14px 30px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .close-modal-btn:hover { background: #e0e0e0; transform: scale(1.03); }

        /* --- AI BUBBLE & ANIMATIONS --- */
        #chat-bubble {
            position: absolute; bottom: 25px; right: 25px; width: 60px; height: 60px;
            background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; pointer-events: auto; 
            box-shadow: 0px 4px 20px rgba(0,0,0,0.4);
            animation: floatBubble 4s ease-in-out infinite;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #chat-bubble::after {
            content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            z-index: -1; filter: blur(12px); opacity: 0.25;
            transition: opacity 0.3s ease;
        }

        #chat-bubble:hover { transform: scale(1.1); }
        #chat-bubble:hover::after { opacity: 0.5; }

        @keyframes floatBubble {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .ai-icon-svg { width: 28px; height: 28px; fill: #000; }

        /* CHAT WINDOW */
        #chat-window {
            position: absolute; bottom: 100px; right: 25px; width: 350px; height: 500px;
            background: #111; border: 1px solid #222; border-radius: 24px;
            display: none; flex-direction: column; pointer-events: auto; overflow: hidden;
            box-shadow: 0px 20px 40px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>

<div id="ai-widget-wrapper">
    <div id="exit-modal">
        <div class="modal-offer">Wait! One last thing... 🎁</div>
        <div class="modal-text">Grab <b>20% OFF</b> your next order before you go. Valid for the next 24 hours!</div>
        <div class="promo-code">NEXT20</div>
        <button class="close-modal-btn" onclick="closeModal()">Claim Discount</button>
        <p style="font-size: 12px; color: #555; margin-top: 20px; cursor: pointer;" onclick="closeModal()">Maybe later</p>
    </div>

    <div id="chat-bubble" onclick="toggleChat()">
        <svg class="ai-icon-svg" viewBox="0 0 24 24"><path d="M19,9L17.75,11.75L15,13L17.75,14.25L19,17L20.25,14.25L23,13L20.25,11.75L19,9M9,5L7,11L1,13L7,15L9,21L11,15L17,13L11,11L9,5M19,1L18.25,2.75L16.5,3.5L18.25,4.25L19,6L19.75,4.25L21.5,3.5L19.75,2.75L19,1Z" /></svg>
    </div>

    <div id="chat-window">
        <div style="padding:20px; border-bottom:1px solid #222; font-weight:bold;">AI Assistant</div>
        <div style="flex:1; padding:20px; font-size:14px; color:#888;">How can I help you?</div>
    </div>
</div>

<script>
let hasPopped = false;

// MODAL CONTROLS
function closeModal() {
    document.getElementById('exit-modal').classList.remove('active');
}

// EXIT INTENT TRIGGER
document.addEventListener('mousemove', function(e) {
    // Only trigger if mouse is at the very top (URL bar area)
    if (e.clientY < 10 && !hasPopped) {
        document.getElementById('exit-modal').classList.add('active');
        hasPopped = true;
    }
});

// CHAT TOGGLE
function toggleChat() {
    const win = document.getElementById('chat-window');
    win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
}
</script>
</body>
</html>
