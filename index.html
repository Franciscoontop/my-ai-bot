<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Business Assistant</title>
    <style>
        /* RESET & BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; }

        /* THE BUBBLE - Forced to the absolute front */
        #chat-bubble {
            position: fixed !important;
            bottom: 30px !important;
            right: 30px !important;
            width: 65px;
            height: 65px;
            background: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2147483647 !important; /* Highest possible 32-bit integer */
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            transition: transform 0.2s ease;
        }

        #chat-bubble:hover { transform: scale(1.08); }

        /* MINIMAL GLOW */
        #chat-bubble::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            z-index: -1;
            filter: blur(10px);
            opacity: 0.25;
        }

        .ai-icon-svg { width: 30px; height: 30px; fill: #000; }

        /* THE WINDOW - Forced to the absolute front */
        #chat-window {
            position: fixed !important;
            bottom: 110px !important;
            right: 30px !important;
            width: 380px;
            max-width: 90vw;
            height: 600px;
            max-height: 80vh;
            background: #111111;
            border: 1px solid #333333;
            border-radius: 24px;
            display: none; /* Controlled by JS */
            flex-direction: column;
            z-index: 2147483647 !important;
            overflow: hidden;
            box-shadow: 0 12px 48px rgba(0,0,0,0.8);
        }

        /* HEADER */
        #chat-header {
            padding: 20px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-info { display: flex; align-items: center; gap: 12px; }
        .dot { width: 8px; height: 8px; background: #00ff88; border-radius: 50%; }
        .close-btn { cursor: pointer; color: #888; font-size: 20px; }

        /* MESSAGES */
        #response-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #0a0a0a;
        }

        .message-row { display: flex; width: 100%; }
        .ai-row { justify-content: flex-start; }
        .user-row { justify-content: flex-end; }

        .msg-bubble {
            max-width: 80%;
            padding: 12px 16px;
            font-size: 14px;
            line-height: 1.5;
            border-radius: 18px;
        }

        .ai-msg { background: #222; color: #fff; border-bottom-left-radius: 4px; border: 1px solid #333; }
        .user-msg { background: #fff; color: #000; border-bottom-right-radius: 4px; }

        /* INPUT */
        .input-area {
            padding: 20px;
            background: #111;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #444;
            color: #fff;
            padding: 12px;
            border-radius: 12px;
            outline: none;
        }

        .send-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .lead-status {
            text-align: center;
            font-size: 12px;
            color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
            padding: 8px;
            margin-top: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div id="chat-bubble" onclick="toggleChat()">
    <svg class="ai-icon-svg" viewBox="0 0 24 24"><path d="M19,9L17.75,11.75L15,13L17.75,14.25L19,17L20.25,14.25L23,13L20.25,11.75L19,9M9,5L7,11L1,13L7,15L9,21L11,15L17,13L11,11L9,5M19,1L18.25,2.75L16.5,3.5L18.25,4.25L19,6L19.75,4.25L21.5,3.5L19.75,2.75L19,1Z" /></svg>
</div>

<div id="chat-window">
    <div id="chat-header">
        <div class="header-info">
            <div class="dot"></div>
            <b>Assistant</b>
        </div>
        <span class="close-btn" onclick="toggleChat()">✕</span>
    </div>
    <div id="response-container">
        <div class="message-row ai-row">
            <div class="msg-bubble ai-msg">Hi! I can help you book an appointment. What's your <b>Name</b> and what <b>Service</b> do you need?</div>
        </div>
    </div>
    <div class="input-area">
        <input id="msg" placeholder="Type here..." onkeypress="if(event.key === 'Enter') send()" />
        <button class="send-btn" onclick="send()">Send</button>
    </div>
</div>

<script>
let chatHistory = [];
let leadSent = false;

function toggleChat() {
    const win = document.getElementById('chat-window');
    // Force direct style manipulation to bypass any CSS conflicts
    if (win.style.display === 'flex') {
        win.style.display = 'none';
    } else {
        win.style.display = 'flex';
    }
}

async function send() {
    const input = document.getElementById("msg");
    const container = document.getElementById("response-container");
    const val = input.value.trim();
    if (!val) return;

    // Display User Message
    container.innerHTML += `<div class="message-row user-row"><div class="msg-bubble user-msg">${val}</div></div>`;
    chatHistory.push({ role: "user", content: val });
    input.value = "";
    container.scrollTop = container.scrollHeight;

    // Prepare AI Placeholder
    const aiId = "ai-" + Date.now();
    container.innerHTML += `<div class="message-row ai-row"><div id="${aiId}" class="msg-bubble ai-msg">...</div></div>`;

    try {
        const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages: chatHistory }),
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        const aiBubble = document.getElementById(aiId);
        aiBubble.innerText = "";
        let fullText = "";

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value);
            const lines = chunk.split("\n");
            for (const line of lines) {
                if (line.startsWith("data: ")) {
                    const dataStr = line.replace("data: ", "").trim();
                    if (dataStr === "[DONE]") break;
                    try {
                        const data = JSON.parse(dataStr);
                        const content = data.choices[0].delta.content || "";
                        aiBubble.innerText += content;
                        fullText += content;
                        container.scrollTop = container.scrollHeight;
                    } catch (e) {}
                }
            }
        }
        chatHistory.push({ role: "assistant", content: fullText });
        checkLead(val, fullText, container);
    } catch (e) {
        document.getElementById(aiId).innerText = "Error. Please refresh.";
    }
}

function checkLead(u, a, container) {
    const phoneRx = /(\d{3}[-\s.]?\d{3}[-\s.]?\d{4})|(\(\d{3}\)\s?\d{3}[-\s.]?\d{4})/;
    const timeRx = /(am|pm|tomorrow|today|o'clock|\d{1,2}:\d{2})/i;
    
    if (phoneRx.test(u + a) && timeRx.test(u + a) && !leadSent) {
        leadSent = true;
        const firstName = chatHistory.find(m => m.role === "user").content
            .replace(/(my name is|i'm|i am|this is|hi|hey)\s+/gi, "")
            .split(' ')[0].replace(/[^a-zA-Z]/g, "");

        fetch("https://hooks.zapier.com/hooks/catch/27378409/uvukyhr/", {
            method: "POST",
            body: JSON.stringify({
                customer_name: firstName || "New Lead",
                phone: (u + a).match(phoneRx)[0],
                transcript: container.innerText
            })
        }).then(() => {
            container.innerHTML += `<div class="lead-status">📅 Booking details sent to owner!</div>`;
            container.scrollTop = container.scrollHeight;
        });
    }
}
</script>
</body>
</html>
