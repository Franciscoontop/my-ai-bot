-<!DOCTYPE html>
<html>
<head>
    <title>AI Business Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 600px; margin: auto; }
        #response { white-space: pre-wrap; background: #f4f4f4; padding: 15px; border-radius: 8px; min-height: 50px; border: 1px solid #ddd; }
        input { padding: 10px; width: 70%; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; cursor: pointer; background: #000; color: #fff; border: none; border-radius: 5px; }
        .review-box { text-align: center; margin-top: 40px; padding: 20px; border-top: 1px solid #eee; }
        
        /* Popup Styling with Fading Animation */
        #ai-popup { 
            display: none; 
            position: fixed; 
            bottom: 80px; 
            right: 20px; 
            width: 280px; 
            background: white; 
            border: 2px solid #000; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2); 
            z-index: 9999;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        #ai-popup.show {
            display: block !important;
    opacity: 1 !important;
    transform: translateY(0) !important;
        }

        .close-btn {
            position: absolute;
            top: 5px;
            right: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 20px;
            color: #888;
        }
        .close-btn:hover { color: #000; }
    </style>
</head>
<body>

<h1>AI Business Assistant</h1>

<div style="margin-bottom: 20px;">
    <input id="msg" placeholder="Ask about our services..." />
    <button onclick="send()">Send</button>
</div>

<div id="response">Your AI assistant is ready to help!</div>

<div id="ai-popup">
    <span class="close-btn" onclick="closePopup()">×</span>
    <p><strong>Wait!</strong> 🤖 Before you go, did you know we have a 20% discount for new clients this week?</p>
    <button onclick="closePopup()" style="width:100%;">Ask AI about it</button>
</div>

<div class="review-box">
   <p>Happy with our service?</p>
   <a href="https://docs.google.com/document/d/10tkUO6lDqPb57OPWiHVjpNjezC6L1YQN3L6h3I9r-qU/edit?tab=t.0" target="_blank" style="text-decoration:none; color:blue; font-weight:bold; font-size: 1.2em;">
     ⭐ Leave us a Google Review
   </a>
</div>

<script>
let hasSentLead = false;

// --- AI CHAT LOGIC ---
async function send() {
  const input = document.getElementById("msg");
  const responseElement = document.getElementById("response");
  const message = input.value;
  if (!message) return;

  responseElement.innerText = "Connecting..."; 
  input.value = ""; 

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    responseElement.innerText = ""; 

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split("\n");

      for (const line of lines) {
        if (line.startsWith("data: ")) {
          const dataStr = line.replace("data: ", "").trim();
          if (dataStr === "[DONE]") break;

          try {
            const data = JSON.parse(dataStr);
            const content = data.choices[0].delta.content || "";
            responseElement.innerText += content;

            const phoneRegex = /(\d{3}[-\s.]?\d{3}[-\s.]?\d{4})/;
            const foundPhone = responseElement.innerText.match(phoneRegex);

            if (foundPhone && !hasSentLead) {
                hasSentLead = true; 
                fetch("https://hooks.zapier.com/hooks/catch/27378409/uvukyhr/", {
                    method: "POST",
                    body: JSON.stringify({ phone: foundPhone[0], full_chat: responseElement.innerText })
                });
            }
          } catch (e) {}
        }
      }
    }
  } catch (err) {
    responseElement.innerText = "Error: " + err.message;
  }
}

// --- SMART POPUP LOGIC ---

function showPopup() {
    const popup = document.getElementById('ai-popup');
    const wasClosed = localStorage.getItem('discountPopupClosed');

    // Only show if user hasn't closed it before in this browser
    if (popup && !wasClosed) {
        popup.style.display = 'block';
        setTimeout(() => {
            popup.classList.add('show');
        }, 10);
    }
}

function closePopup() {
    const popup = document.getElementById('ai-popup');
    
    // Start fade out animation
    popup.classList.remove('show');
    
    // Remember that the user closed it
    localStorage.setItem('discountPopupClosed', 'true');

    // Fully hide after animation (0.4s)
    setTimeout(() => {
        popup.style.display = 'none';
    }, 400);
}

// ONLY Trigger: Mouse leaves top (Exit Intent)
document.addEventListener("mouseleave", function(e) {
    if (e.clientY < 0) { 
        showPopup();
    }
});
</script>

</body>
</html>
