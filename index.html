<!DOCTYPE html>
<html>
<head>
    <title>AI Business Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; }
        #ai-widget-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
        #chat-bubble { position: absolute; bottom: 20px; right: 20px; width: 60px; height: 60px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; pointer-events: auto; box-shadow: 0 4px 15px rgba(255,255,255,0.2); }
        #chat-window { position: absolute; bottom: 90px; right: 20px; width: 350px; height: 500px; background: #111; border: 1px solid #333; border-radius: 15px; display: none; flex-direction: column; pointer-events: auto; overflow: hidden; }
        #chat-window.open { display: flex; }
        #chat-header { background: #222; padding: 15px; font-weight: bold; border-bottom: 1px solid #333; }
        #response-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; font-size: 14px; max-width: 80%; line-height: 1.4; }
        .ai-msg { background: #333; align-self: flex-start; }
        .user-msg { background: #fff; color: #000; align-self: flex-end; }
        .input-area { padding: 10px; display: flex; gap: 5px; border-top: 1px solid #333; }
        input { flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; }
        button { padding: 8px 15px; background: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="ai-widget-wrapper">
    <div id="chat-bubble" onclick="toggleChat()">💬</div>
    <div id="chat-window">
        <div id="chat-header">AI Sales Assistant</div>
        <div id="response-container"></div>
        <div class="input-area">
            <input id="msg" placeholder="Your name/question..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">Send</button>
        </div>
    </div>
</div>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQVsTHX1E0Jd-f2oVoNH8N2YXdzgPZcn6iwmHE7GM8-nvMkZxZ93KEtN0jyCd4iqu1NjvBvmcOx9eu7/pub?output=csv';
let SHEET_DATA = "";
let chatHistory = [];

async function loadData() {
    try {
        const res = await fetch(SHEET_URL + '&t=' + Date.now());
        const text = await res.text();
        // Clean CSV to simple key-value pairs for the AI
        SHEET_DATA = text.split('\n').map(line => line.replace(/"/g, '').trim()).join(" | ");
        addMessage("ai", "Hello! To get started with a custom automation plan, what is your first and last name and email?");
    } catch (e) { console.error("Data error"); }
}

function toggleChat() { document.getElementById('chat-window').classList.toggle('open'); }

function addMessage(role, text) {
    const container = document.getElementById("response-container");
    const div = document.createElement("div");
    div.className = `msg ${role}-msg`;
    div.innerText = text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

async function send() {
    const input = document.getElementById("msg");
    const val = input.value.trim();
    if (!val) return;

    addMessage("user", val);
    chatHistory.push({ role: "user", content: val });
    input.value = "";

    try {
        const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sheetData: SHEET_DATA, messages: chatHistory })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullText = "";
        
        // Placeholder for AI response
        const aiDiv = document.createElement("div");
        aiDiv.className = "msg ai-msg";
        document.getElementById("response-container").appendChild(aiDiv);

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value);
            const lines = chunk.split("\n");
            for (const line of lines) {
                if (line.startsWith("data: ")) {
                    try {
                        const json = JSON.parse(line.slice(6));
                        const content = json.choices[0]?.delta?.content;
                        if (content) {
                            fullText += content;
                            aiDiv.innerText = fullText;
                        }
                    } catch (e) {}
                }
            }
        }
        chatHistory.push({ role: "assistant", content: fullText });
    } catch (err) {
        addMessage("ai", "Sorry, I'm having trouble connecting. Please try again!");
    }
}
loadData();
</script>
</body>
</html>
